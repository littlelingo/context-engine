name: Build Plugin

permissions:
  contents: write
  
on:
  push:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.CE_PAT }}
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Build plugin
        run: ./build-plugin.sh
      - name: Get version
        id: version
        run: |
          VERSION=$(python3 -c "import json; print(json.load(open('.claude-plugin/marketplace.json'))['plugins'][0]['version'])")
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "tag=v$VERSION" >> "$GITHUB_OUTPUT"
      - name: Commit dist/
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add dist/
          git diff --staged --quiet || git commit -m "chore: rebuild plugin dist"
          git push
      - name: Check if tag exists
        id: tag_check
        run: |
          git fetch --tags origin
          TAG="${{ steps.version.outputs.tag }}"
          if git tag -l "$TAG" | grep -q .; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
          fi
      - name: Create tag and release
        if: steps.tag_check.outputs.exists == 'false'
        run: |
          TAG="${{ steps.version.outputs.tag }}"
          git tag "$TAG"
          git push origin "$TAG"
          gh release create "$TAG" \
            --title "Context Engine $TAG" \
            --generate-notes
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}