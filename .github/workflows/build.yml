name: Build Plugin

permissions:
  contents: write
  
on:
  push:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: true
          token: ${{ secrets.GITHUB_TOKEN }}
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Build plugin
        run: ./build-plugin.sh
      - name: Commit dist/
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add dist/
          git diff --staged --quiet || git commit -m "chore: rebuild plugin dist"
          git push